<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shards Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

html,body{
width:100%;
height:100%;
background:#050505;
color:#fff;
overflow:hidden;
}

#particles{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:0;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
animation:fadeOut 2.5s ease forwards;
animation-delay:2.5s;
}

.logo{
font-size:6rem;
font-weight:800;
letter-spacing:5px;
color:#ff4d6d;
animation:pop 1.2s ease;
}

@keyframes pop{
0%{transform:scale(0);opacity:0;}
70%{transform:scale(1.2);}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* NAV */
.nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:10;
display:flex;
gap:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:10px 20px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

.nav button{
background:none;
border:none;
color:#fff;
opacity:0.7;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.nav button:hover{opacity:1;}
.nav button.active{color:#ff4d6d;opacity:1;}

/* PAGE TRANSITIONS */
.page{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
z-index:1;
padding-top:80px;
animation:fadeIn 0.4s ease;
}

.page.active{display:block;}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* HERO */
.hero{
height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(255,77,109,0.2);
}

.hero h1{font-size:3.5rem;font-weight:800;}
.hero p{opacity:0.7;margin-top:10px;}

.button{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#ff4d6d;
border-radius:12px;
color:#fff;
text-decoration:none;
font-weight:600;
transition:0.3s;
}
.button:hover{transform:scale(1.05);background:#ff1f4b;}

.dashboard{
position:absolute;
left:20px;
top:100px;
width:240px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
border-radius:16px;
padding:20px;
z-index:2;
}

.status{opacity:0.8;font-size:14px;margin:8px 0;}
.timer{font-size:20px;font-weight:700;color:#ff4d6d;}

.container{padding:40px 10%;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px;}

.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);padding:20px;border-radius:18px;border:1px solid rgba(255,255,255,0.1);}

.footer{text-align:center;padding:20px;opacity:0.5;position:relative;z-index:2;}

/* MOBILE */
@media(max-width:768px){
.dashboard{position:relative;top:0;left:0;width:90%;margin:20px auto;}
.hero h1{font-size:2.5rem;}
.nav{flex-wrap:wrap;}
}

/* NOTIFICATION */
#notify{
position:fixed;
bottom:20px;
right:20px;
background:#ff4d6d;
padding:12px 18px;
border-radius:10px;
opacity:0;
transition:0.4s;
z-index:9999;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="notify"></div>

<div id="intro"><div class="logo">S</div></div>

<div class="nav">
<button class="active" onclick="navigate('home',this)">Home</button>
<button onclick="navigate('updates',this)">Updates</button>
<button onclick="navigate('pricing',this)">Pricing</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="dashboard">
<h3>Dashboard</h3>
<div class="status" id="online">Online Users: 0</div>
<div class="status">Status: Live</div>
<div class="timer" id="countdown">Loading...</div>
</div>

<div class="hero">
<div class="glass">
<h1>Shards</h1>
<p>Premium • Fast • Clean Experience</p>
<a class="button" href="#" onclick="startDownload()">Download</a>
</div>
</div>

</div>

<!-- UPDATES -->
<div id="updates" class="page">
<div class="container">
<h2>Updates</h2>
<div class="grid">
<div class="card">🚀 Version 1.0 Released</div>
<div class="card">⚡ Performance Improvements</div>
<div class="card">🎨 UI Upgrade</div>
</div>
</div>
</div>

<!-- PRICING -->
<div id="pricing" class="page">
<div class="container">
<h2>Pricing</h2>
<div class="grid">
<div class="card">Free Plan - $0</div>
<div class="card">Pro Plan - $9.99</div>
<div class="card">Elite Plan - $19.99</div>
</div>
</div>
</div>

<div class="footer">© 2026 Shards Premium</div>

<script>
// ROUTING
function navigate(page,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
document.getElementById(page).classList.add('active');
btn.classList.add('active');

history.pushState({page},'', '#'+page);
localStorage.setItem('lastPage',page);
showToast('Switched to '+page);
}

window.addEventListener('load',()=>{
let saved=localStorage.getItem('lastPage');
if(saved && document.getElementById(saved)){
let btn=[...document.querySelectorAll('.nav button')].find(b=>b.textContent.toLowerCase()===saved);
if(btn) navigate(saved,btn);
}
});

window.addEventListener('popstate',(e)=>{
if(e.state?.page){
let btn=[...document.querySelectorAll('.nav button')][0];
navigate(e.state.page,btn);
}
});

// DOWNLOAD
function startDownload(){
showToast('Starting download...');
window.location.href="https://discord.gg/ec7QEnSvA";
}

// ONLINE USERS
function updateOnline(){
let base=120;
let random=Math.floor(Math.random()*30);
document.getElementById('online').innerText="Online Users: "+(base+random);
}
setInterval(updateOnline,3000);
updateOnline();

// COUNTDOWN
let eventDate=new Date();
eventDate.setDate(eventDate.getDate()+2);

function updateCountdown(){
let now=new Date().getTime();
let distance=eventDate-now;
let d=Math.floor(distance/(1000*60*60*24));
let h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((distance%(1000*60*60))/(1000*60));
let s=Math.floor((distance%(1000*60))/1000);
document.getElementById("countdown").innerText=`Event: ${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateCountdown,1000);
updateCountdown();

// TOAST
function showToast(msg){
let n=document.getElementById('notify');
n.innerText=msg;
n.style.opacity=1;
setTimeout(()=>n.style.opacity=0,2000);
}

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<80;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,dx:(Math.random()-0.5),dy:(Math.random()-0.5)});
}
function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let p of particles){
p.x+=p.dx;p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,77,109,0.6)";
ctx.fill();
}
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
